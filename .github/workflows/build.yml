name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 安装Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git libssl-dev libffi-dev autoconf automake libtool zlib1g-dev openjdk-17-jdk

      - name: 安装构建工具
        run: |
          pip install --upgrade pip
          pip install buildozer==1.6.0 cython==0.29.37 kivy==2.2.1 kivymd==1.2.0

      - name: 编译APK
        run: buildozer android debug

      - name: 上传生成的APK
        uses: actions/upload-artifact@v4
        with:
          name: 记账APP-APK安装包
          path: bin/*.apk
